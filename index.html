<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>그린 헬 공략 가이드</title>
<link rel="icon" type="image/svg+xml" href="icon/icon.svg"/>
<link rel="apple-touch-icon" href="icon/apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="그린 헬"/>
<meta name="theme-color" content="#0a1a0d"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
:root {
  --bg: #0e1a12;
  --bg2: #152018;
  --bg3: #1c2a1f;
  --surface: #1e2d22;
  --surface2: #253329;
  --border: rgba(80,160,80,0.18);
  --border2: rgba(80,160,80,0.32);
  --green: #4caf6e;
  --green2: #2e7d4f;
  --green-dim: rgba(76,175,110,0.12);
  --red: #e05555;
  --red-dim: rgba(224,85,85,0.12);
  --amber: #e6a030;
  --amber-dim: rgba(230,160,48,0.12);
  --text: #d9edd4;
  --text2: #8aab88;
  --text3: #5a7558;
  --danger: #e05555;
  --caution: #e6a030;
  --mild: #4caf6e;
  --radius: 10px;
  --radius-sm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0;padding:0 16px;}
.nav-logo{display:flex;align-items:center;gap:8px;padding:14px 12px 14px 0;border-right:1px solid var(--border);margin-right:4px;}
.nav-logo-icon{width:30px;height:30px;background:var(--green2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;}
.nav-logo-icon i{color:#fff;font-size:16px;}
.nav-logo-text{font-size:15px;font-weight:700;color:var(--text);}
.nav-tabs{display:flex;gap:0;}
.nav-tab{padding:14px 14px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green);}
.nav-tab:hover{color:var(--text2);}

/* ── LAYOUT ── */
.page{display:none;padding:20px 16px 40px;max-width:800px;margin:0 auto;}
.page.active{display:block;}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:16px;}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text3);pointer-events:none;}
.search-wrap input{width:100%;padding:10px 12px 10px 38px;font-size:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;outline:none;}
.search-wrap input:focus{border-color:var(--border2);}
.search-wrap input::placeholder{color:var(--text3);}

/* ── FILTER TABS ── */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.ftab{padding:5px 12px;font-size:11px;font-weight:500;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;font-family:inherit;}
.ftab.active{background:var(--green2);border-color:var(--green2);color:#fff;}
.ftab:hover:not(.active){border-color:var(--border2);color:var(--text2);}

/* ── COUNT ── */
.count-line{font-size:11px;color:var(--text3);margin-bottom:10px;}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:border-color .15s,background .15s;}
.card:hover{border-color:var(--border2);background:var(--surface2);}
.card-top{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap;}
/* craft badges */
.b-basic{background:rgba(76,175,110,.15);color:#4caf6e;}
.b-blade{background:rgba(224,85,85,.15);color:#e07070;}
.b-axe{background:rgba(230,160,48,.15);color:#e6a030;}
.b-spear{background:rgba(230,130,60,.15);color:#e68040;}
.b-ranged{background:rgba(130,100,220,.15);color:#a080e0;}
.b-bandage{background:rgba(200,100,150,.15);color:#e090b0;}
.b-armor{background:rgba(60,140,200,.15);color:#60a0d0;}
.b-tool{background:rgba(76,175,110,.15);color:#6abf88;}
/* food */
.b-food{background:rgba(76,175,110,.15);color:#4caf6e;}
.safe-b{background:rgba(76,175,110,.15);color:#4caf6e;}
.caution-b{background:rgba(230,160,48,.15);color:#e6a030;}
.danger-b{background:rgba(224,85,85,.15);color:#e05555;}
/* status */
.b-status-danger{background:rgba(224,85,85,.15);color:#e05555;}
.b-status-caution{background:rgba(230,160,48,.15);color:#e6a030;}
.b-status-mild{background:rgba(76,175,110,.15);color:#4caf6e;}

.tier-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.t-early{background:#4caf6e;}
.t-mid{background:#e6a030;}
.t-late{background:#e05555;}
.card-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;}
.card-sub{font-size:11px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ── STATUS CARD ── */
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .15s;}
.scard:hover{border-color:var(--border2);}
.scard[data-sev="danger"]{border-top:2px solid var(--danger);}
.scard[data-sev="caution"]{border-top:2px solid var(--caution);}
.scard[data-sev="mild"]{border-top:2px solid var(--mild);}
.scard-icon{height:52px;display:flex;align-items:center;padding:0 12px;gap:10px;}
.scard-icon[data-sev="danger"]{background:rgba(224,85,85,.1);}
.scard-icon[data-sev="caution"]{background:rgba(230,160,48,.1);}
.scard-icon[data-sev="mild"]{background:rgba(76,175,110,.1);}
.scard-icon svg{width:28px;height:28px;flex-shrink:0;}
.scard-icon-label{font-size:10px;font-weight:500;}
.scard-icon[data-sev="danger"] .scard-icon-label{color:#e05555;}
.scard-icon[data-sev="caution"] .scard-icon-label{color:#e6a030;}
.scard-icon[data-sev="mild"] .scard-icon-label{color:#4caf6e;}
.scard-body{padding:10px 12px 12px;}
.scard-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;}
.scard-cause{font-size:11px;color:var(--text3);margin-bottom:5px;line-height:1.4;}
.scard-treat{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.scard-treat i{font-size:12px;color:var(--green);}

/* ── DETAIL ── */
.detail{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.detail.open{display:block;}
.detail-hero{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:14px;}
.detail-hero[data-sev="danger"]{background:rgba(224,85,85,.1);}
.detail-hero[data-sev="caution"]{background:rgba(230,160,48,.1);}
.detail-hero[data-sev="mild"]{background:rgba(76,175,110,.1);}
.detail-hero svg{width:40px;height:40px;flex-shrink:0;}
.back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;margin-bottom:12px;font-family:inherit;}
.back-btn:hover{color:var(--text2);}
.d-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px;}
.d-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:4px;}
.divider{height:1px;background:var(--border);margin:10px 0;}
.dlabel{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 7px;}
.mats{display:flex;flex-wrap:wrap;gap:6px;}
.mat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;color:var(--text2);}
.eff-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text);line-height:1.5;margin-bottom:5px;}
.eff-row i{font-size:14px;color:var(--green);flex-shrink:0;margin-top:2px;}
.eff-row.bad i{color:var(--red);}
.tip-box{background:var(--bg3);border-left:3px solid var(--green2);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:9px 12px;font-size:12px;color:var(--text2);margin-top:12px;line-height:1.65;}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:14px;}
.empty i{font-size:32px;display:block;margin-bottom:8px;opacity:.5;}

/* ── RESPONSIVE ── */
@media(max-width:500px){
  .nav-tab{padding:12px 10px;font-size:12px;}
  .page{padding:14px 12px 40px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <div class="nav-logo-icon"><i class="ti ti-leaf"></i></div>
    <span class="nav-logo-text">그린 헬</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('craft',this)">⚒ 조합법</button>
    <button class="nav-tab" onclick="showPage('food',this)">🌿 음식</button>
    <button class="nav-tab" onclick="showPage('status',this)">🩹 상태이상</button>
  </div>
</nav>

<!-- ════ 조합법 ════ -->
<div id="page-craft" class="page active">
  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input id="craft-search" type="text" placeholder="아이템 이름, 재료 검색..." oninput="renderCraft()"/>
  </div>
  <div class="filter-row" id="craft-filters"></div>
  <div id="craft-count" class="count-line"></div>
  <div id="craft-list"></div>
  <div id="craft-detail" class="detail"></div>
</div>

<!-- ════ 음식 ════ -->
<div id="page-food" class="page">
  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input id="food-search" type="text" placeholder="음식 이름, 효과 검색..." oninput="renderFood()"/>
  </div>
  <div class="filter-row" id="food-filters"></div>
  <div id="food-count" class="count-line"></div>
  <div id="food-list"></div>
  <div id="food-detail" class="detail"></div>
</div>

<!-- ════ 상태이상 ════ -->
<div id="page-status" class="page">
  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input id="status-search" type="text" placeholder="증상, 치료법 검색..." oninput="renderStatus()"/>
  </div>
  <div class="filter-row" id="status-filters"></div>
  <div id="status-count" class="count-line"></div>
  <div id="status-list"></div>
  <div id="status-detail" class="detail"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const CRAFT_CATS={basic:'기본',blade:'칼',axe:'도끼',spear:'창',ranged:'원거리',bandage:'붕대',armor:'방어구',tool:'주형·도구'};
const CRAFT_CLS={basic:'b-basic',blade:'b-blade',axe:'b-axe',spear:'b-spear',ranged:'b-ranged',bandage:'b-bandage',armor:'b-armor',tool:'b-tool'};
const TIER={early:'초반',mid:'중반',late:'후반'};

const CRAFT=[
  // ── 기본 ──

  {id:2,cat:'basic',tier:'early',name:'밧줄',mats:['리아나 줄기 수집'],effects:['다수 조합법의 핵심 재료'],tip:'한 번에 10개씩 쌓입니다. 미리 넉넉히 확보하세요.',desc:'조합의 기본 재료. 리아나 나무 덩굴 수집으로 획득.'},
  {id:3,cat:'basic',tier:'early',name:'코코넛 수통',mats:['코코넛 ×1','밧줄 ×1'],effects:['물 40 저장 가능'],tip:'초반 수분 확보의 기본.',desc:'코코넛 껍질로 만드는 초기 물통.'},
  {id:4,cat:'basic',tier:'early',name:'핸드 드릴',mats:['나뭇가지 ×1','작은 나뭇가지 ×1'],effects:['마찰로 불 피우기 가능'],tip:'비가 오면 사용 불가. 불씨를 미리 확보해두세요.',desc:'마찰로 불을 피우는 원시 점화 도구.'},

  {id:6,cat:'basic',tier:'early',name:'코코넛 그릇',mats:['코코넛 ×1'],effects:['물 끓이기 가능','음식 조리 용기'],tip:'초반에 물 끓이는 가장 쉬운 방법.',desc:'코코넛 반쪽으로 만드는 그릇.'},

  {id:17,cat:'axe',tier:'early',name:'도끼',mats:['돌 ×2','나뭇가지 ×1','밧줄 ×1'],effects:['돌도끼보다 내구도 향상'],tip:'돌 2개 + 밧줄로 만드는 일반 도끼.',desc:'돌도끼보다 강화된 도끼.'},

function showPage(id, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
}

/* ═══════════════════════════════════════════
   CRAFT
═══════════════════════════════════════════ */
function initCraftFilters(){
  const row=document.getElementById('craft-filters');
  const cats=[['all','전체'],...Object.entries(CRAFT_CATS)];
  row.innerHTML=cats.map(([k,v])=>`<button class="ftab${k==='all'?' active':''}" onclick="setCraftCat('${k}',this)">${v}</button>`).join('');
}
function setCraftCat(c,el){
  craftCat=c;
  document.querySelectorAll('#craft-filters .ftab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('craft-detail').classList.remove('open');
  renderCraft();
}
function renderCraft(){
  const q=document.getElementById('craft-search').value.toLowerCase();
  const f=CRAFT.filter(d=>(craftCat==='all'||d.cat===craftCat)&&(!q||d.name.toLowerCase().includes(q)||d.mats.join(' ').toLowerCase().includes(q)||(d.desc&&d.desc.toLowerCase().includes(q))));
  const list=document.getElementById('craft-list');
  document.getElementById('craft-detail').classList.remove('open');
  document.getElementById('craft-count').textContent=f.length+'개 조합법';
  if(!f.length){list.innerHTML='<div class="empty"><i class="ti ti-search-off"></i>검색 결과 없음</div>';return;}
  list.innerHTML='<div class="grid">'+f.map(d=>`
    <div class="card" onclick="showCraftDetail(${d.id})">
      <div class="card-top">
        <span class="badge ${CRAFT_CLS[d.cat]}">${CRAFT_CATS[d.cat]}</span>
        <div class="tier-dot t-${d.tier}" title="${TIER[d.tier]}"></div>
      </div>
      <div class="card-name">${d.name}</div>
      <div class="card-sub">${d.mats.join(' + ')}</div>
    </div>`).join('')+'</div>';
}
function showCraftDetail(id){
  const d=CRAFT.find(x=>x.id===id);
  if(!d)return;
  document.getElementById('craft-list').innerHTML='';
  document.getElementById('craft-count').textContent='';
  const el=document.getElementById('craft-detail');
  el.innerHTML=`
    <button class="back-btn" onclick="renderCraft()"><i class="ti ti-arrow-left"></i> 목록으로</button>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <span class="badge ${CRAFT_CLS[d.cat]}">${CRAFT_CATS[d.cat]}</span>
      <span class="badge" style="background:var(--bg3);color:var(--text3)">${TIER[d.tier]}</span>
    </div>
    <div class="d-title">${d.name}</div>
    <div class="divider"></div>
    <div class="d-desc">${d.desc}</div>
    <div class="dlabel">필요 재료</div>
    <div class="mats">${d.mats.map(m=>`<span class="mat">${m}</span>`).join('')}</div>
    <div class="dlabel">효과</div>
    ${d.effects.map(e=>`<div class="eff-row"><i class="ti ti-check"></i>${e}</div>`).join('')}
    ${d.tip?`<div class="tip-box"><i class="ti ti-bulb" style="color:var(--green);margin-right:6px;font-size:13px"></i>${d.tip}</div>`:''}
  `;
  el.classList.add('open');
}

function renderStatus(){
  const q=document.getElementById('status-search').value.toLowerCase();
  const f=STATUS.filter(d=>(statusSev==='all'||d.sev===statusSev)&&(!q||d.name.toLowerCase().includes(q)||d.cause.toLowerCase().includes(q)||d.treat.toLowerCase().includes(q)));
  const list=document.getElementById('status-list');
  document.getElementById('status-detail').classList.remove('open');
  document.getElementById('status-count').textContent=f.length+'개 상태이상';
  if(!f.length){list.innerHTML='<div class="empty"><i class="ti ti-search-off"></i>검색 결과 없음</div>';return;}
  list.innerHTML='<div class="grid">'+f.map(d=>`
    <div class="scard" data-sev="${d.sev}" onclick="showStatusDetail(${d.id})">
      <div class="scard-icon" data-sev="${d.sev}">
        ${STATUS_ICONS[d.icon]}
        <span class="scard-icon-label">${d.en}</span>
      </div>
      <div class="scard-body">
        <div class="scard-name">${d.name}</div>
        <div class="scard-cause"><i class="ti ti-bolt" style="font-size:10px;margin-right:3px"></i>${d.cause}</div>
        <div class="scard-treat"><i class="ti ti-first-aid-kit"></i>${d.treat}</div>
      </div>
    </div>`).join('')+'</div>';
}
function showStatusDetail(id){
  const d=STATUS.find(x=>x.id===id);
  if(!d)return;
  document.getElementById('status-list').innerHTML='';
  document.getElementById('status-count').textContent='';
  const el=document.getElementById('status-detail');
  el.innerHTML=`
    <button class="back-btn" onclick="renderStatus()"><i class="ti ti-arrow-left"></i> 목록으로</button>
    <div class="detail-hero" data-sev="${d.sev}">
      ${STATUS_ICONS[d.icon]}
      <div>
        <div class="d-title" style="margin-bottom:2px">${d.name}</div>
        <span class="badge ${SEV_CLS[d.sev]}">${SEV_LABEL[d.sev]}</span>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px"><i class="ti ti-bolt" style="font-size:12px;margin-right:4px"></i>원인: ${d.cause}</div>
    <div class="divider"></div>
    <div class="dlabel">증상</div>
    ${d.symptoms.map(s=>`<div class="eff-row bad"><i class="ti ti-alert-circle"></i>${s}</div>`).join('')}
    <div class="dlabel">치료법</div>
    ${d.treatments.map(t=>`<div class="eff-row"><i class="ti ti-first-aid-kit"></i>${t}</div>`).join('')}
    ${d.tip?`<div class="tip-box"><i class="ti ti-bulb" style="color:var(--green);margin-right:6px;font-size:13px"></i>${d.tip}</div>`:''}
  `;
  el.classList.add('open');
}

   INIT
═══════════════════════════════════════════ */
initCraftFilters();
initFoodFilters();
initStatusFilters();
renderCraft();
renderFood();
renderStatus();
</script>
